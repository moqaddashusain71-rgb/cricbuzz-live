<!DOCTYPE html>
<html>
<head>
<title>PRO CRICKET LIVE</title>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
text-align:center;
}

h1{
color:#22c55e;
}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:8px;
border:none;
}

button{
padding:10px 15px;
margin:5px;
background:#1e293b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

.match{
background:#1e293b;
margin:10px;
padding:15px;
border-radius:10px;
}

.live{
color:red;
font-weight:bold;
}

</style>

</head>

<body>

<h1>🏏 PRO CRICKET LIVE</h1>

<input id="search" placeholder="Search team or match">

<br>

<button onclick="filter('live')">LIVE</button>
<button onclick="filter('upcoming')">UPCOMING</button>
<button onclick="filter('completed')">RESULT</button>

<div id="matches"></div>

<p>Visitors: <span id="visit">0</span></p>

<script>

const API="https://api.cricapi.com/v1/currentMatches?apikey=00279dc951144e43b8413ac3ce36137e";

let matches=[];

async function load(){

const res=await fetch(API);
const data=await res.json();

matches=data.data;

show(matches);

}

function show(list){

const box=document.getElementById("matches");
box.innerHTML="";

if(list.length===0){
box.innerHTML="No matches found";
return;
}

list.forEach(m=>{

let score="";

if(m.score){

let s1=m.score[0];
let s2=m.score[1];

score=
(s1?.r||0)+"/"+(s1?.w||0)+" ("+(s1?.o||0)+" ov)"
+" | "+
(s2?.r||0)+"/"+(s2?.w||0)+" ("+(s2?.o||0)+" ov)";
}

box.innerHTML+=`

<div class="match">

<h3>${m.name}</h3>

<p>${score}</p>

<p>${m.status}</p>

</div>

`;

});

}

function filter(type){

let filtered=matches.filter(m=>m.matchType===type);

show(filtered);

}

document.getElementById("search").addEventListener("input",function(){

let text=this.value.toLowerCase();

let filtered=matches.filter(m=>m.name.toLowerCase().includes(text));

show(filtered);

});

load();

setInterval(load,20000);

let v=localStorage.getItem("visit");

if(!v){v=0}

v++;

localStorage.setItem("visit",v);

document.getElementById("visit").innerText=v;

</script>

</body>
</html>
