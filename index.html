<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>PRO Cricket Ultra V2</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0f172a;
    color:white;
}

header{
    background:#ff3d00;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.nav{
    display:flex;
    overflow:auto;
    background:#1e293b;
}

.nav div{
    padding:10px 15px;
    cursor:pointer;
}

.nav div:hover{
    background:#ff3d00;
}

.active{
    background:#ff3d00;
}

.search{
    padding:10px;
    text-align:center;
}

.search input{
    width:80%;
    padding:10px;
    border-radius:10px;
    border:none;
}

.match{
    background:#1e293b;
    margin:10px;
    padding:12px;
    border-radius:10px;
}

.live{color:#00e676;}
.upcoming{color:#ffea00;}
.result{color:#03a9f4;}
</style>
</head>

<body>

<header>🏏 PRO CRICKET ULTRA</header>

<div class="nav">
<div onclick="loadMatches('live')" class="active">Live</div>
<div onclick="loadMatches('upcoming')">Upcoming</div>
<div onclick="loadMatches('completed')">Results</div>
</div>

<div class="search">
<input type="text" id="searchBox" placeholder="Search Team..." onkeyup="searchMatch()">
</div>

<div id="matches"></div>

<script>

const API_KEY = "6b6d143f-b3b8-4a38-97c5-2ba6f5fbb7eb;
let allMatches = [];

async function loadMatches(type){
    document.getElementById("matches").innerHTML = "Loading...";

    let res = await fetch(`https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}&offset=0`);
    let data = await res.json();

    allMatches = data.data;

    displayMatches(type);
}

function displayMatches(type){
    let container = document.getElementById("matches");
    container.innerHTML = "";

    allMatches.forEach(match => {

        if(type === "live" && match.matchStarted && !match.matchEnded){
            showMatch(match, "live");
        }
        else if(type === "completed" && match.matchEnded){
            showMatch(match, "result");
        }
        else if(type === "upcoming" && !match.matchStarted){
            showMatch(match, "upcoming");
        }

    });
}

function showMatch(match, cls){
    let div = document.createElement("div");
    div.className = "match";

    div.innerHTML = `
    <b>${match.name}</b><br>
    <span class="${cls}">${match.status}</span>
    `;

    document.getElementById("matches").appendChild(div);
}

function searchMatch(){
    let input = document.getElementById("searchBox").value.toLowerCase();
    let container = document.getElementById("matches");
    container.innerHTML = "";

    allMatches.forEach(match => {
        if(match.name.toLowerCase().includes(input)){
            showMatch(match, "live");
        }
    });
}

// Default Load
loadMatches('live');

</script>

</body>
</html>
