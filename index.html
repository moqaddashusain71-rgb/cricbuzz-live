<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Cricket PRO Overlay</title>
<style>
body {
  margin:0; padding:0; font-family: 'Arial', sans-serif;
  background: linear-gradient(to bottom, #0b1e2d, #132f4c);
  color:white; display:flex; justify-content:center; align-items:center; height:100vh;
}
.scoreboard {
  position: relative;
  background: rgba(19,47,76,0.95);
  border-radius: 20px;
  padding: 20px;
  width: 95%;
  max-width: 450px;
  text-align: center;
  box-shadow: 0 0 20px rgba(255,255,255,0.2);
}
.live-badge {
  position: absolute;
  top: -10px; left: 50%; transform: translateX(-50%);
  background: red; color:white; padding:5px 15px; border-radius:20px;
  font-weight:bold; font-size:18px; box-shadow: 0 0 10px red;
}
.teams { display:flex; justify-content:space-between; font-size:20px; font-weight:bold; margin-bottom:15px; }
.scores { display:flex; justify-content:space-between; font-size:18px; margin-bottom:15px; }
.stats { font-size:14px; color:#ccc; }
.top-scorer, .wickets { display:flex; justify-content:space-between; margin:5px 0; }
.team-color1 { color:#ffcd00; }
.team-color2 { color:#00bfff; }
.background-overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:url('assets/stadium-bg.jpg') no-repeat center center/cover; opacity:0.1; border-radius:20px; z-index:-1; }
</style>
</head>
<body>

<div class="scoreboard">
  <div class="background-overlay"></div>
  <div class="live-badge">🔴 LIVE</div>

  <div class="teams">
    <div id="team1-name" class="team-color1">Team1</div>
    <div id="team2-name" class="team-color2">Team2</div>
  </div>

  <div class="scores">
    <div id="team1-score" class="team-color1">0/0 (0.0 ov)</div>
    <div id="team2-score" class="team-color2">0/0 (0.0 ov)</div>
  </div>

  <div class="stats">
    <div class="top-scorer">Top Scorer: <span id="top-scorer">Player1 0(0)</span></div>
    <div class="wickets">Wickets: <span id="wickets">Bowler1 0/0</span></div>
  </div>
</div>

<script>
const API_KEY = "6b6d143f-b3b8-4a38-97c5-2ba6f5fbb7eb";
let matchId = null;

async function fetchLiveScore() {
  try {
    let url = matchId 
      ? `https://api.cricapi.com/v1/matches/${matchId}?apikey=${API_KEY}` 
      : `https://api.cricapi.com/v1/currentMatches?apikey=${API_KEY}`;

    const res = await fetch(url);
    const data = await res.json();
    let match = data.data?.[0] || data.data;
    if (!match) return;

    document.getElementById("team1-name").textContent = match["team-1"];
    document.getElementById("team2-name").textContent = match["team-2"];
    document.getElementById("team1-score").textContent = match.score || "0/0 (0.0 ov)";
    document.getElementById("team2-score").textContent = match.score || "0/0 (0.0 ov)";
    document.getElementById("top-scorer").textContent = match.batsman || "Player1 0(0)";
    document.getElementById("wickets").textContent = match.bowler || "Bowler1 0/0";
  } catch(err) {
    console.log("Error fetching live score:", err);
  }
}

fetchLiveScore();
setInterval(fetchLiveScore, 15000);
</script>

</body>
</html>
