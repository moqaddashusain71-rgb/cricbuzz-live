<!DOCTYPE html>
<html>
<head>
<title>PRO CRICKET LIVE</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
padding:0;
text-align:center;
}

header{
background:#020617;
padding:15px;
font-size:28px;
font-weight:bold;
color:#22c55e;
}

#search{
width:90%;
padding:14px;
margin:15px;
border-radius:10px;
border:none;
font-size:16px;
}

.tabs{
margin-bottom:10px;
}

.tabs button{
padding:12px 18px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
background:#1e293b;
color:white;
}

.match{
background:#1e293b;
margin:12px;
padding:18px;
border-radius:12px;
text-align:left;
font-size:16px;
}

.match h3{
margin:0;
font-size:18px;
color:#22c55e;
}

.score{
font-size:20px;
margin:6px 0;
}

.status{
color:#facc15;
}

.live{
color:red;
font-weight:bold;
}

footer{
margin-top:20px;
font-size:14px;
opacity:0.7;
}

</style>

</head>

<body>

<header>🏏 PRO CRICKET LIVE</header>

<input id="search" placeholder="Search team or match">

<div class="tabs">
<button onclick="showMatches(allMatches)">ALL</button>
<button onclick="filterMatches('live')">LIVE</button>
<button onclick="filterMatches('fixture')">UPCOMING</button>
<button onclick="filterMatches('result')">RESULT</button>
</div>

<div id="matches"></div>

<footer>
Visitors: <span id="visit">0</span>
</footer>

<script>

const API="https://api.cricapi.com/v1/currentMatches?apikey=00279dc951144e43b8413ac3ce36137e";

let allMatches=[];

async function loadMatches(){

try{

const res=await fetch(API);
const data=await res.json();

allMatches=data.data || [];

showMatches(allMatches);

}catch(e){

document.getElementById("matches").innerHTML="Error loading matches";

}

}

function showMatches(list){

const box=document.getElementById("matches");
box.innerHTML="";

if(list.length===0){

box.innerHTML="<p>No matches available</p>";
return;

}

list.forEach(m=>{

let score="";

if(m.score && m.score.length){

let s1=m.score[0];
let s2=m.score[1];

score=
(s1?.r||0)+"/"+(s1?.w||0)+" ("+(s1?.o||0)+" ov)"
+" | "+
(s2?.r||0)+"/"+(s2?.w||0)+" ("+(s2?.o||0)+" ov)";
}

box.innerHTML+=`

<div class="match">

<h3>${m.name}</h3>

<div class="score">${score}</div>

<div class="status">${m.status}</div>

</div>

`;

});

}

function filterMatches(type){

let filtered=allMatches.filter(m=>m.ms===type);

showMatches(filtered);

}

document.getElementById("search").addEventListener("input",function(){

let text=this.value.toLowerCase();

let filtered=allMatches.filter(m=>m.name.toLowerCase().includes(text));

showMatches(filtered);

});

loadMatches();

setInterval(loadMatches,30000);

let v=localStorage.getItem("visit")||0;

v++;

localStorage.setItem("visit",v);

document.getElementById("visit").innerText=v;

</script>

</body>
</html>
