<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PRO Cricket Ultra</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">  <div class="p-4 text-center text-3xl font-bold">
    🏏 PRO CRICKET ULTRA
  </div>  <div class="flex justify-center gap-4 mb-6">
    <button onclick="loadMatches('live')" class="bg-red-500 px-4 py-2 rounded">Live</button>
    <button onclick="loadMatches('upcoming')" class="bg-blue-500 px-4 py-2 rounded">Upcoming</button>
    <button onclick="loadMatches('recent')" class="bg-green-500 px-4 py-2 rounded">Results</button>
  </div>  <div id="matches" class="grid grid-cols-1 md:grid-cols-2 gap-4 p-4"></div>  <script>
    const API = "https://cricbuzz-live.vercel.app/v1/matches/";

    async function loadMatches(type) {
      document.getElementById('matches').innerHTML = "Loading...";
      const res = await fetch(API + type);
      const data = await res.json();

      const matches = data.typeMatches?.flatMap(t =>
        t.seriesMatches?.flatMap(s => s.seriesAdWrapper?.matches || [])
      ) || [];

      let html = "";

      matches.forEach(m => {
        const info = m.matchInfo;
        const score = m.matchScore;

        html += `
          <div class="bg-gray-800 p-4 rounded-xl shadow">
            <h2 class="text-xl font-bold">${info.team1.teamName} vs ${info.team2.teamName}</h2>
            <p class="text-sm text-gray-400">${info.venueInfo.ground}</p>
            <p class="mt-2">${score?.team1Score?.inngs1?.runs || '-'} / ${score?.team1Score?.inngs1?.wickets || ''}</p>
            <p>${score?.team2Score?.inngs1?.runs || '-'} / ${score?.team2Score?.inngs1?.wickets || ''}</p>
            <p class="text-yellow-400 mt-2">${info.status}</p>
          </div>
        `;
      });

      document.getElementById('matches').innerHTML = html;
    }

    loadMatches('live');
  </script></body>
</html>
